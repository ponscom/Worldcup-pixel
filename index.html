<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Back to World Cup - Legends Edition</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;image-rendering:pixelated}
:root{--px:#00ff41;--red:#ff3333;--yel:#ffff00;--cya:#00bfff;--wht:#e8e8e8;--bg:#0d0d1a;--card:#111122;--surface:#1a1a2e;--border:#2a2a4a;--dim:#666688}
html{background:var(--bg)}
body{background:var(--bg);color:var(--wht);font-family:'Press Start 2P',monospace;font-size:10px;line-height:1.7;min-height:100vh}
.hidden{display:none!important}
body::before{content:"";position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.13) 2px,rgba(0,0,0,0.13) 4px);pointer-events:none;z-index:9000}
.app{padding:14px;max-width:1000px;margin:0 auto}
.header{text-align:center;padding:28px 0 20px;border-bottom:3px solid var(--yel);margin-bottom:18px;position:relative;overflow:hidden}
.lang-switch{position:absolute;top:8px;right:8px;display:flex;gap:4px;z-index:10}
.lang-btn{padding:5px 9px;font-size:8px;font-family:'Press Start 2P',monospace;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;transition:all .1s}
.lang-btn.on{background:var(--px);color:#000;border-color:var(--px)}
.header::before{content:"";position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--yel),var(--px),var(--cya),var(--red));animation:rbow 2s linear infinite;background-size:200%}
@keyframes rbow{0%{background-position:0%}100%{background-position:200%}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.logo-back{font-size:13px;color:var(--red);letter-spacing:6px;margin-bottom:4px}
.logo-main{font-size:32px;text-shadow:4px 4px 0 var(--red),0 0 28px var(--yel);letter-spacing:5px;line-height:1.4;margin-bottom:6px}
.logo-world{color:var(--cya);text-shadow:4px 4px 0 #0066aa,0 0 22px var(--cya)}
.logo-cup{color:var(--yel)}
.logo-ed{font-size:13px;letter-spacing:6px;margin-top:8px}
.card{background:var(--card);border:2px solid var(--border);padding:14px;margin-bottom:12px}
.slbl{font-size:8px;color:var(--cya);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:5px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:700px){.grid2{grid-template-columns:1fr}}
@media(max-width:480px){
  .logo-main{font-size:22px;letter-spacing:3px}
  .logo-back,.logo-ed{font-size:9px;letter-spacing:4px}
}
.fr{margin-bottom:12px}
.fr label{display:block;font-size:8px;color:var(--cya);margin-bottom:5px;letter-spacing:1px}
.fr input,.fr select{width:100%;padding:7px 10px;font-size:8px;font-family:'Press Start 2P',monospace;border:2px solid var(--border);background:var(--bg);color:var(--wht);outline:none}
.fr input:focus,.fr select:focus{border-color:var(--px)}
#inp-name{font-size:13px;padding:10px 12px;border-color:var(--yel);color:var(--yel);letter-spacing:2px}
.palette{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px}
.swatch{width:22px;height:22px;cursor:pointer;border:2px solid transparent;transition:transform .1s;flex-shrink:0}
.swatch:hover,.swatch.on{border-color:var(--wht);transform:scale(1.2)}
.flag-box{width:108px;height:68px;border:2px solid var(--border);margin-top:7px;position:relative;overflow:hidden}
.flag-sm{width:72px;height:46px;border:2px solid var(--border);position:relative;overflow:hidden;flex-shrink:0}
/* PITCH */
.pitch-wrap{position:relative;width:100%;padding-top:124%;background:#0a3d0a;border:2px solid #00aa00;margin-bottom:10px;overflow:hidden}
.pitch-inner{position:absolute;inset:0}
.pitch-inner::before{content:"";position:absolute;inset:0;background:linear-gradient(#00aa00 0 1px,transparent 1px 50%,#00aa00 50% calc(50% + 1px),transparent calc(50% + 1px)) 0 0/100% 100%;opacity:.4;pointer-events:none}
.pitch-inner::after{content:"";position:absolute;top:50%;left:50%;width:20%;padding-top:20%;border:1px solid rgba(0,170,0,.5);border-radius:50%;transform:translate(-50%,-50%)}
.pen-top{position:absolute;top:0;left:30%;width:40%;height:12%;border:1px solid rgba(0,170,0,.4);border-top:none}
.pen-bot{position:absolute;bottom:0;left:30%;width:40%;height:12%;border:1px solid rgba(0,170,0,.4);border-bottom:none}
.mid-line{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(0,170,0,.6);pointer-events:none;z-index:3}
.pslot{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:2px;z-index:5;cursor:pointer}
.pdot{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;cursor:pointer;clip-path:polygon(3px 0,calc(100% - 3px) 0,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0 calc(100% - 3px),0 3px);transition:box-shadow .1s}
.pdot:hover,.pdot.sel{box-shadow:0 0 0 2px var(--yel),0 0 10px var(--yel)}
.pdot.filled{box-shadow:0 0 0 2px var(--px)}
.pname{font-size:8px;color:#fff;text-shadow:1px 1px 0 #000,-1px -1px 0 #000;text-align:center;max-width:56px;line-height:1.3}
.prole{font-size:6px;color:var(--cya);text-shadow:1px 1px 0 #000;text-align:center;letter-spacing:1px;margin-top:1px}
.pstars{font-size:8px;text-align:center;line-height:1.2}
.pval{font-size:7px;color:var(--yel);text-align:center;text-shadow:1px 1px 0 #000}
/* BUDGET */
.bbar-wrap{background:var(--bg);border:2px solid var(--border);padding:10px;margin-bottom:12px}
.bbar-track{height:10px;background:#111;border:1px solid var(--border);overflow:hidden;margin-top:5px}
.bbar-fill{height:100%;transition:width .3s,background .3s}
.bnums{display:flex;justify-content:space-between;font-size:7px;color:var(--dim);margin-top:4px}
/* CAND */
.cand-panel{margin-top:12px;background:var(--bg);border:2px solid var(--border);padding:12px;max-height:300px;overflow-y:auto}
.cand-title{font-size:8px;color:var(--yel);margin-bottom:10px}
.cand-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(116px,1fr));gap:7px}
.cand-card{background:var(--card);border:2px solid var(--border);padding:9px;cursor:pointer;transition:border-color .1s}
.cand-card:hover{border-color:var(--px);background:var(--surface)}
.cname{font-size:8px;color:var(--wht);margin-bottom:4px}
.crole{font-size:7px;color:var(--dim);margin-bottom:3px}
.cpow{font-size:8px;margin-bottom:2px}
.cstars{font-size:9px}
/* BTN */
.btn{display:block;width:100%;padding:11px 10px;font-size:8px;font-family:'Press Start 2P',monospace;border:2px solid var(--border);background:var(--card);color:var(--wht);cursor:pointer;text-align:center;letter-spacing:1px;text-transform:uppercase;position:relative;transition:all .1s}
.btn::after{content:"▶";position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:7px;opacity:.5}
.btn:hover:not(:disabled){border-color:var(--px);color:var(--px)}
.btn:active:not(:disabled){transform:translateY(1px)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.btn-p{border-color:var(--cya);color:var(--cya)}
.btn-p:hover:not(:disabled){background:var(--surface);box-shadow:0 0 8px var(--cya)}
.btn-g{border-color:var(--yel);color:var(--yel)}
.btn-g:hover:not(:disabled){background:var(--surface);box-shadow:0 0 8px var(--yel)}
.btn-sm{padding:7px 12px;font-size:7px;width:auto;display:inline-block}
.btn-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
/* SCOREBOARD */
.scoreboard{background:#050508;border:3px solid var(--border);padding:14px;margin-bottom:10px;position:relative}
.scoreboard::before{content:"LIVE";position:absolute;top:5px;right:8px;font-size:7px;color:var(--red);animation:blink 1s infinite}
.sb-timer{font-size:13px;text-align:center;color:var(--cya);margin-bottom:6px;text-shadow:0 0 8px var(--cya)}
.sb-score{font-size:44px;text-align:center;color:var(--yel);line-height:1;text-shadow:0 0 14px var(--yel),2px 2px 0 rgba(0,0,0,.9);letter-spacing:6px}
.sb-teamrow{display:flex;justify-content:space-between;margin-top:10px;padding-top:6px;border-top:1px solid var(--border)}
.sb-tname{font-size:10px;color:var(--yel);display:flex;align-items:center;gap:6px}
.sb-dot{width:14px;height:14px;border:2px solid rgba(255,255,255,.4);flex-shrink:0;display:inline-block}
.sb-scorers{display:flex;justify-content:space-between;font-size:8px;margin-top:8px;gap:8px}
.sb-col{flex:1;line-height:2}
.sb-col.r{text-align:right}
.sc-u{color:var(--px)}
.sc-o{color:var(--red)}
/* LIVE CONTROLS */
.lc{background:var(--bg);border:2px solid var(--border);padding:8px 10px;margin-top:8px}
.lc-lbl{font-size:7px;color:var(--cya);margin-bottom:5px;letter-spacing:1px}
.lc-btns{display:flex;gap:4px;flex-wrap:nowrap}
.lc-btn{flex:1;padding:6px 2px;font-size:6px;font-family:'Press Start 2P',monospace;border:1px solid var(--border);background:var(--card);color:var(--dim);cursor:pointer;transition:all .1s;text-align:center;white-space:nowrap}
.lc-btn:hover{border-color:var(--cya);color:var(--cya)}
.lc-btn.on{border-color:var(--yel);color:var(--yel);background:var(--surface)}
/* LOG */
.mlog{background:#030305;font-family:'Press Start 2P',monospace;font-size:8px;border:2px solid var(--border);padding:12px;height:240px;overflow-y:auto;line-height:2.2}
.l-n{color:var(--dim)}
.l-u{color:var(--px);padding:2px 0}
.l-o{color:var(--red);padding:2px 0}
.l-gu{color:var(--px);font-size:9px;background:#001a00;padding:5px 8px;margin:4px 0;border-left:3px solid var(--px)}
.l-go{color:var(--red);font-size:9px;background:#1a0000;padding:5px 8px;margin:4px 0;border-left:3px solid var(--red)}
.l-p{color:var(--cya);padding:3px 0}
.l-var{color:var(--yel);background:#0f0a00;padding:4px 8px;margin:4px 0}
.l-pu{color:var(--px);padding:2px 0;font-size:9px}
.l-po{color:var(--red);padding:2px 0;font-size:9px}
.l-miss{color:var(--dim);padding:2px 0}
.l-end{color:var(--wht);text-align:center;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:5px 0;margin:5px 0;font-size:9px}
/* TABLE */
.st{width:100%;font-size:8px;border-collapse:collapse;margin-top:10px}
.st th{background:var(--surface);padding:8px 10px;text-align:left;color:var(--cya);border-bottom:2px solid var(--border)}
.st td{padding:7px 10px;border-bottom:1px solid var(--border);color:var(--wht)}
.st tr.ur td{color:var(--px)}
.st .num{text-align:right}
/* KO */
.ko-list{margin-top:10px}
.ko-item{display:flex;align-items:center;padding:6px 8px;border-bottom:1px solid var(--border);font-size:7px;gap:8px}
.ko-item.umatch{border-left:3px solid var(--yel);background:var(--surface)}
.ko-item.played-item{color:var(--dim)}
.ko-item-teams{flex:1;color:var(--wht);line-height:1.8}
.ko-item-res{font-size:9px;color:var(--yel);min-width:40px;text-align:center}
.ko-item-win{font-size:6px;color:var(--px);min-width:50px}
.ko-m.played{border-color:var(--px)}
.ko-m.umatch{border-color:var(--yel)}
.ko-teams{color:var(--wht);margin-bottom:5px;line-height:2}
.ko-res{color:var(--yel);font-size:10px;margin-bottom:4px}
.ko-win{color:var(--px);font-size:7px}
.ko-pend{color:var(--dim);font-size:7px}
/* PREVIEW */
.mprev{background:var(--bg);border:2px solid var(--border);padding:14px;text-align:center;margin-bottom:12px}
.mprev-t{font-size:10px;color:var(--yel);margin-bottom:6px;line-height:2.2}
.mprev-p{font-size:8px;color:var(--dim)}
.mprev-pred{font-size:7px;margin-top:8px;letter-spacing:1px;padding:4px 0;border-top:1px solid var(--border)}
.pbadge{display:inline-block;font-size:7px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);color:var(--cya);margin-bottom:12px;letter-spacing:1px}
#other-results{font-size:8px;color:var(--dim);margin-top:10px;border-top:1px solid var(--border);padding-top:8px;line-height:2.5}
/* REPORT */
.rep-wrap{text-align:center;padding:18px 0}
.rep-stage{font-size:11px;color:var(--yel);margin-bottom:16px;line-height:2;text-shadow:0 0 10px var(--yel)}
.rep-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:14px 0}
.stat-box{background:var(--bg);border:2px solid var(--border);padding:12px}
.stat-num{font-size:20px;color:var(--px)}
.stat-lbl{font-size:7px;color:var(--dim);margin-top:5px}
.champ-note{background:var(--surface);border:2px solid var(--yel);padding:14px;margin:14px 0;font-size:8px;line-height:2.2}
.champ-note .cn-l{color:var(--dim);margin-bottom:6px;display:block}
.champ-note .cn-n{font-size:13px;color:var(--yel);text-shadow:0 0 10px var(--yel);display:block;margin-top:4px}
/* FLASH/OVERLAY */
.flash-overlay{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:9010}
@keyframes fG{0%,100%{background:rgba(0,255,65,0)}40%,60%{background:rgba(0,255,65,.25)}}
@keyframes fR{0%,100%{background:rgba(255,51,51,0)}40%,60%{background:rgba(255,51,51,.25)}}
.fl-g{animation:fG .5s 3;opacity:1}
.fl-r{animation:fR .5s 3;opacity:1}
.goal-ann{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#050508;border:3px solid var(--px);padding:16px 24px;color:var(--px);font-size:11px;font-family:'Press Start 2P',monospace;z-index:9020;text-align:center;max-width:300px;display:none;pointer-events:none;line-height:2.2;box-shadow:0 0 24px var(--px);text-shadow:0 0 10px var(--px)}
.goal-ann.opp{border-color:var(--red);color:var(--red);box-shadow:0 0 24px var(--red);text-shadow:0 0 10px var(--red)}
.res-ov{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:9030;display:none;align-items:center;justify-content:center;flex-direction:column;font-family:'Press Start 2P',monospace;text-align:center}
.res-ov.show{display:flex}
.res-svg{margin-bottom:20px}
.res-title{font-size:14px;color:var(--yel);text-shadow:0 0 12px var(--yel);margin-bottom:10px;line-height:2;animation:pulse 1.5s infinite}
.res-score{font-size:24px;color:var(--wht);margin-bottom:8px}
.res-sub{font-size:8px;color:var(--dim);margin-bottom:20px;line-height:2}
.res-close{font-size:8px;color:var(--cya);border:2px solid var(--cya);background:transparent;font-family:'Press Start 2P',monospace;padding:10px 18px;cursor:pointer;letter-spacing:1px}
.res-close:hover{background:var(--surface)}
</style>
</head>
<body>
<div id="flash" class="flash-overlay"></div>
<div id="goal-ann" class="goal-ann"></div>
<div id="res-ov" class="res-ov">
  <div id="res-svg" class="res-svg"></div>
  <div id="res-title" class="res-title"></div>
  <div id="res-score" class="res-score"></div>
  <div id="res-sub" class="res-sub"></div>
  <div id="res-motm" style="display:none;background:var(--surface);border:1px solid var(--border);padding:8px 14px;margin-bottom:16px;text-align:center"></div>
  <button class="res-close" data-i18n="res_continue" onclick="closeOverlay()">▶ CONTINUE</button>
</div>

<div class="app">
  <div class="header">
    <div class="lang-switch" id="lang-switch">
      <button class="lang-btn on" id="lang-en" onclick="setLang('en')">EN</button>
      <button class="lang-btn" id="lang-it" onclick="setLang('it')">IT</button>
    </div>
    <div class="logo-back">BACK TO</div>
    <div class="logo-main"><span class="logo-world">WORLD</span> <span class="logo-cup">CUP</span></div>
    <div class="logo-ed"><span style="color:var(--red)">L</span><span style="color:var(--yel)">E</span><span style="color:var(--px)">G</span><span style="color:var(--cya)">E</span><span style="color:var(--wht)">N</span><span style="color:var(--red)">D</span><span style="color:var(--yel)">S</span> <span style="color:var(--px)">E</span><span style="color:var(--cya)">D</span><span style="color:var(--wht)">I</span><span style="color:var(--red)">T</span><span style="color:var(--yel)">I</span><span style="color:var(--px)">O</span><span style="color:var(--cya)">N</span></div>
  </div>

  <!-- SCREEN 1: IDENTITA -->
  <div id="s1">
    <div style="max-width:520px;margin:0 auto">
      <div class="card">
        <div class="slbl" data-i18n="s1_title">▸ CREATE YOUR NATIONAL TEAM</div>
        <div class="fr"><label data-i18n="lbl_team_name">TEAM NAME</label><input id="inp-name" type="text" value="MY NATIONAL TEAM" maxlength="18"></div>
        <div class="fr"><label data-i18n="lbl_primary_color">PRIMARY COLOR</label><div class="palette" id="pal-p"></div></div>
        <div class="fr"><label data-i18n="lbl_secondary_color">SECONDARY COLOR</label><div class="palette" id="pal-s"></div></div>
        <div class="fr">
          <label data-i18n="lbl_flag">FLAG</label>
          <select id="sel-flag">
            <option value="horiz" data-i18n="flag_horiz">3 HORIZONTAL STRIPES</option><option value="vert" data-i18n="flag_vert">3 VERTICAL STRIPES</option>
            <option value="cross" data-i18n="flag_cross">NORDIC CROSS</option><option value="swiss" data-i18n="flag_swiss">SWISS CROSS</option>
            <option value="diag" data-i18n="flag_diag">DIAGONAL</option><option value="circle" data-i18n="flag_circle">CIRCLE</option>
            <option value="checker" data-i18n="flag_checker">CHECKERBOARD</option><option value="half" data-i18n="flag_half">HALF AND HALF</option>
          </select>
          <div class="flag-box" id="flag-preview"></div>
        </div>
        <div class="fr">
          <label data-i18n="lbl_difficulty">DIFFICULTY</label>
          <select id="sel-diff" onchange="onDiffChange()">
            <option value="easy" data-i18n="diff_easy">EASY — budget 105.0</option>
            <option value="medium" selected data-i18n="diff_medium">MEDIUM — budget 100.0</option>
            <option value="hard" data-i18n="diff_hard">HARD — budget 95.0</option>
            <option value="random" data-i18n="diff_random">RANDOM — 95 to 105</option>
          </select>
        </div>
        <div class="fr">
          <label data-i18n="lbl_speed">GAME SPEED</label>
          <select id="sel-speed-init" onchange="setSpd(this.value)">
            <option value="fast" data-i18n="speed_fast_init">FAST — key actions only</option>
            <option value="normal" selected data-i18n="speed_normal_init">NORMAL — standard commentary</option>
            <option value="slow" data-i18n="speed_slow_init">EXTENDED — detailed commentary</option>
          </select>
        </div>
        <div style="margin-top:16px"><button class="btn btn-g" data-i18n="btn_next_squad" onclick="goPage2()">▶ NEXT: PICK YOUR SQUAD</button></div>
      </div>
    </div>
  </div>

  <!-- SCREEN 2: FORMAZIONE + ROSA -->
  <div id="s2" class="hidden">
    <div class="grid2">
      <div class="card">
        <div class="slbl" data-i18n="s2_tactics">▸ TACTICS</div>
        <div class="fr"><label data-i18n="lbl_formation">FORMATION</label>
          <select id="sel-fm" onchange="onFormationChange()">
            <option value="4-3-3">4-3-3</option><option value="4-4-2">4-4-2</option>
            <option value="3-5-2">3-5-2</option><option value="4-2-3-1">4-2-3-1</option>
            <option value="5-3-2">5-3-2</option><option value="3-4-3">3-4-3</option>
            <option value="4-5-1">4-5-1</option><option value="4-1-4-1">4-1-4-1</option>
            <option value="5-4-1">5-4-1</option><option value="4-3-2-1">4-3-2-1 (XMAS)</option>
            <option value="4-2-4">4-2-4</option>
          </select>
        </div>
        <div class="fr"><label data-i18n="lbl_style">PLAYING STYLE</label>
          <select id="sel-style">
            <option value="ultra-d" data-i18n="style_ultrad">DEFENSE+ (maximum cover)</option>
            <option value="difesa" data-i18n="style_difesa">DEFENSE (cautious)</option>
            <option value="medio" selected data-i18n="style_medio">BALANCED</option>
            <option value="attacco" data-i18n="style_attacco">ATTACK (proactive)</option>
            <option value="ultra-a" data-i18n="style_ultraa">ATTACK+ (all out)</option>
          </select>
        </div>
        <div style="margin-top:12px;padding:10px;background:var(--bg);border:1px solid var(--border)">
          <div style="font-size:7px;color:var(--dim);margin-bottom:6px" data-i18n="lbl_preview">PREVIEW</div>
          <div style="display:flex;align-items:center;gap:12px">
            <div class="flag-sm" id="flag-sm"></div>
            <div>

function applyLang(){

  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const key=el.getAttribute("data-i18n");
    const val=T(key);
    if(el.tagName==="OPTION"||el.tagName==="LABEL"||el.tagName==="BUTTON"||el.tagName==="SPAN"||el.tagName==="DIV"||el.tagName==="TH"){
      el.textContent=val;
    }else{
      el.textContent=val;
    }
  });
  // Aggiorna il nome predefinito della nazionale se l'utente non l'ha modificato
  const inp=document.getElementById("inp-name");
  if(inp){
    const otherDefault=LANG==="en"?"LA MIA NAZIONALE":"MY NATIONAL TEAM";
    if(inp.value.trim()===""||inp.value.trim().toUpperCase()===otherDefault){
      inp.value=T("default_team_name");
    }
  }
  // Aggiorna anteprima nome/budget se in screen2
  const pn=document.getElementById("prev-name");
  if(pn&&!document.getElementById("s2").classList.contains("hidden")){
    const name=(document.getElementById("inp-name").value.trim()||T("default_team_name")).toUpperCase();
    pn.textContent=name;
  }
  const pb=document.getElementById("prev-budget");
  if(pb)pb.textContent=T("budget_prefix")+budgetCap.toFixed(1);
  // Se siamo nel torneo, ri-renderizza le parti dinamiche
  if(!document.getElementById("s3").classList.contains("hidden")){
    if(typeof phase!=="undefined"&&phase){
      if(!document.getElementById("v-rep").classList.contains("hidden")&&window._lastReport){
        showReport(window._lastReport.stageKey,window._lastReport.resultType,window._lastReport.extraPhase);
      }else{
        const pb2=document.getElementById("phase-badge");
        if(pb2)pb2.textContent=phase==="Gironi"?T("phase_groups"):tPhase(phase);
        const kr=document.getElementById("ko-rnd");
        if(kr&&phase!=="Gironi")kr.textContent="▸ "+tPhase(phase);

function openDraft(role,idx){
  document.querySelectorAll(".pdot").forEach(d=>d.classList.remove("sel"));
  const dot=document.getElementById("pd-"+idx);if(dot)dot.classList.add("sel");
  const sg=sG(role),used=new Set(squad.filter(Boolean).map(p=>p.n));
  // Pool nativo: ruolo SPECIFICO richiesto dallo slot
  let pool=PLAYERS.filter(p=>!used.has(p.n)&&p.r[0]===role);
  // Aggiungi i "donatori" fuori ruolo previsti per questo slot (es. TQ può giocare CC)
  const flexRoles=ROLE_FLEX[role]||[];
  if(flexRoles.length){
    pool=pool.concat(PLAYERS.filter(p=>!used.has(p.n)&&flexRoles.includes(p.r[0])));
  }
  // Se non abbastanza, allarga al gruppo (fallback raro)
  if(pool.length<6)pool=pool.concat(PLAYERS.filter(p=>!used.has(p.n)&&pG(p.r[0])===sg&&!pool.includes(p)));
  pool.sort((a,b)=>b.pw-a.pw);
  // Distribuzione 12 candidati: 2 top(>=9.5), 3 buoni(9-9.4), 4 medi(8-8.9), 3 base(7-7.9)
  const t=shuf(pool.filter(p=>p.pw>=9.5));
  const g=shuf(pool.filter(p=>p.pw>=9.0&&p.pw<9.5));
  const m=shuf(pool.filter(p=>p.pw>=8.0&&p.pw<9.0));
  const b=shuf(pool.filter(p=>p.pw>=7.0&&p.pw<8.0));
  let sel=[...t.slice(0,2),...g.slice(0,3),...m.slice(0,4),...b.slice(0,3)];
  // Completa fino a 12 con i rimanenti
  if(sel.length<12){
    const ex=pool.filter(p=>!sel.includes(p));
    sel.push(...shuf(ex).slice(0,12-sel.length));
  }
  sel=sel.slice(0,12);
  sel.sort((a,b)=>b.pw-a.pw);
  const grid=document.getElementById("cand-grid");
  const title=document.getElementById("cand-title");
  if(title)title.textContent=TF("cand_title",{ROLE:role,N:sel.length});
  if(grid){
    grid.innerHTML="";
    sel.forEach(p=>{
      const card=document.createElement("div");card.className="cand-card";
      const col=p.pw>=9.5?"var(--red)":p.pw>=9?"var(--yel)":p.pw>=8?"var(--px)":"var(--cya)";
      const isFlex=p.r[0]!==role;
      const flexNote=isFlex?'<div style="font-size:6px;color:var(--yel)">'+TF("flex_note",{V:(p.pw*FLEX_MALUS).toFixed(1)})+'</div>':'';
      card.innerHTML=`<div class="cname">${p.n}</div><div class="crole">${p.r[0]}</div><div style="font-size:6px;color:var(--cya);margin-bottom:2px">${p.from||''}</div><div class="cpow" style="color:${col}">${p.pw.toFixed(1)}</div><div class="cstars">${stars(p.pw)}</div>${flexNote}`;
      card.onclick=()=>pickPlayer(p,idx);
      grid.appendChild(card);
    });
  }
  const cp=document.getElementById("cand-panel");if(cp)cp.classList.remove("hidden");
}

  const slots=FORMATIONS[document.getElementById("sel-fm").value];
  if(slots[0])openDraft(slots[0][2],0);

function updateBudget(){
  const filled=squad.filter(Boolean);
  const total=filled.reduce((sum,p)=>sum+p.pw,0);
  const totalR=Math.round(total*10)/10; // arrotonda a 1 decimale per evitare floating point
  const over=totalR>budgetCap;
  const bv=document.getElementById("bval");if(bv)bv.textContent=totalR.toFixed(1);
  const bc=document.getElementById("bcap");if(bc)bc.textContent=budgetCap.toFixed(1);
  const bs=document.getElementById("bslots");if(bs)bs.textContent=filled.length+"/11";
  const pct=Math.min(100,(totalR/budgetCap)*100);
  const bf=document.getElementById("bfill");if(bf){bf.style.width=pct+"%";bf.style.background=over?"#ff3333":total>85?"#ccaa00":"#00ff41";}
  const bw=document.getElementById("bwarn");if(bw)bw.textContent=over?"OVER BUDGET!":"";
  const bs2=document.getElementById("btn-start");if(bs2)bs2.disabled=!(filled.length===11&&!over);
}

function doRandom(){
  const slots=FORMATIONS[document.getElementById("sel-fm").value];
  const minTarget=budgetCap*0.97; // punta al 97%+ del budget cap
  const FLOOR=7.0; // pw minimo plausibile da riservare per gli slot rimanenti
  let best=null,bestTotal=-1;
  for(let a=0;a<3000;a++){
    let loc=Array(11).fill(null),used=new Set(),total=0,ok=true;
    for(let i=0;i<slots.length;i++){
      const role=slots[i][2];
      const remSlots=slots.length-i;
      const remaining=budgetCap-total;
      const idealPw=remaining/remSlots;
      const maxPw=remaining-(remSlots-1)*FLOOR;
      // SOLO ruolo specifico richiesto dallo slot (rispetto al 100% del ruolo)
      let pool=PLAYERS.filter(p=>!used.has(p.n)&&p.r[0]===role&&p.pw<=maxPw+0.001);
      if(!pool.length){ok=false;break;}
      // Ordina per vicinanza al target ideale e prendi tra i più vicini (con un po' di randomicità)
      pool.sort((x,y)=>Math.abs(x.pw-idealPw)-Math.abs(y.pw-idealPw));
      const topK=pool.slice(0,Math.min(4,pool.length));
      const chosen=rnd(topK);
      loc[i]=chosen;used.add(chosen.n);total+=chosen.pw;
    }
    if(ok&&loc.filter(Boolean).length===11&&total<=budgetCap){
      if(total>bestTotal){best=loc;bestTotal=total;}
      if(total>=minTarget)break; // accetta subito se molto vicino al cap
    }
  }
  if(best){
    squad=best;squadFlex=Array(11).fill(false);
    for(let i=0;i<11;i++){if(squad[i])pickPlayer(squad[i],i);}
    updateBudget();
  }
}

// ═══ POWER & SIM ═══
function teamPow(name){
  if(name===userTeam){
    const base=squad.reduce((s,p,i)=>s+(p?(p.pw*(squadFlex[i]?FLEX_MALUS:1)):0),0)/11;
    return base*styleMods(curStl).pm;
  }
  return HIST[name]?HIST[name].pw:8.5;
}

function simGoals(h,a){
  const pH=teamPow(h),pA=teamPow(a),wH=Math.pow(pH,4),wA=Math.pow(pA,4);
  let sH=0,sA=0,mH=0,mA=0;
  for(let min=1;min<=90;min++){
    mH*=.95;mA*=.95;
    if(Math.random()<0.03){
      const adjH=wH*(1+mH*.05),adjA=wA*(1+mA*.05);
      if(Math.random()*(adjH+adjA)<adjH){sH++;mA+=.3;}else{sA++;mH+=.3;}
    }
  }
  return{sH,sA};
}
function simFull(h,a,force){
  const{sH,sA}=simGoals(h,a);let fH=sH,fA=sA;
  if(fH===fA&&force){const pH=teamPow(h),pA=teamPow(a);if(Math.random()*(Math.pow(pH,4)+Math.pow(pA,4))<Math.pow(pH,4))fH++;else fA++;}
  return{sH:fH,sA:fA,w:fH>fA?h:fA>fH?a:null};
}

function getScorer(team){
  if(team===userTeam){
    const nGk=squad.filter(p=>p&&p.r[0]!=="P");
    const att=nGk.filter(p=>["PC","AS","AD","TQ"].includes(p.r[0]));
    if(att.length&&Math.random()<.82)return rnd(att).n;
    return nGk.length?rnd(nGk).n:"GIOCATORE";
  }
  const sq=HIST[team]?HIST[team].sq:null;
  if(sq){const f=sq.slice(1);if(Math.random()<.72)return f[Math.floor(Math.random()*Math.min(3,f.length))+(f.length>6?6:0)]||f[0];return rnd(f);}
  return"CENTRAVANTI";
}

function startTournament(){
  userTeam=(document.getElementById("inp-name").value.trim()||T("default_team_name")).toUpperCase();
  userStats={m:0,w:0,d:0,l:0,gf:0,gs:0,scorers:{}};
  window._matchHistory=[];
  // Sync stile
  const selSt=document.getElementById("sel-style").value;
  curStl=selSt;setStl(selSt);
  document.getElementById("s2").classList.add("hidden");
  document.getElementById("s3").classList.remove("hidden");
  // Sorteggio a fasce
  const strong=shuf(Object.keys(HIST).filter(t=>HIST[t].tier==="strong"));
  const med=shuf(Object.keys(HIST).filter(t=>HIST[t].tier==="med"));
  const weak=shuf(Object.keys(HIST).filter(t=>HIST[t].tier==="weak"));
  const rivals=[strong[0],rnd(med),rnd(weak)];
  grpRivals=rivals;
  const[A,B,C,D]=[userTeam,...rivals];
  // Pre-calcola partite avversarie MA non le applica subito
  const bcR=simFull(B,C,false),bdR=simFull(B,D,false),cdR=simFull(C,D,false);
  window._rivalRes={B,C,D,bcR,bdR,cdR};
  // Applica subito 1 partita avversaria per simulare il girone in corso
  // (le altre 2 verranno applicate dopo la 2a e 3a partita dell'utente)
  window._rivalApplied=0;
  ugm=[{h:A,a:B,played:false},{h:A,a:C,played:false},{h:D,a:A,played:false}];
  // Classifica: tutti a 0
  window._gs={};
  [A,B,C,D].forEach(n=>{window._gs[n]={n,pts:0,gf:0,gs:0,m:0,isU:n===userTeam};});
  grpIdx=0;phase="Gironi";sfLosers=[];
  document.getElementById("phase-badge").textContent=T("phase_groups");
  // La classifica si aggiorna progressivamente dopo ogni partita
  document.getElementById("other-results").innerHTML="";
  renderGrp();renderPrev();
}

function applyR(h,a,sH,sA){
  const gs=window._gs;if(!gs||!gs[h]||!gs[a])return;
  gs[h].m++;gs[h].gf+=sH;gs[h].gs+=sA;gs[a].m++;gs[a].gf+=sA;gs[a].gs+=sH;
  if(sH>sA)gs[h].pts+=3;else if(sA>sH)gs[a].pts+=3;else{gs[h].pts++;gs[a].pts++;}
}

function renderGrp(){
  const tb=document.getElementById("grp-tbody");if(!tb)return;
  tb.innerHTML="";
  const gs=window._gs;if(!gs)return;
  Object.values(gs).sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:(b.gf-b.gs)-(a.gf-a.gs)).forEach(t=>{
    const tr=document.createElement("tr");if(t.isU)tr.className="ur";
    tr.innerHTML=`<td>${tTeam(t.n)}</td><td class="num">${t.m}</td><td class="num">${t.pts}</td><td class="num">${t.gf}</td><td class="num">${t.gs}</td>`;
    tb.appendChild(tr);
  });
}

function getPrediction(opponent){
  const pU=teamPow(userTeam),pO=teamPow(opponent);
  const wU=Math.pow(pU,4),wO=Math.pow(pO,4);
  const probU=wU/(wU+wO);
  if(probU>=0.58)return{key:"pred_favorite",col:"var(--px)"};
  if(probU<=0.42)return{key:"pred_underdog",col:"var(--red)"};
  return{key:"pred_balanced",col:"var(--yel)"};
}

      }

    }else{

function handlePlay(){
  if(matchState&&matchState.active)return;
  if(phase==="Gironi"){
    if(grpIdx>=ugm.length){goKO();return;}
    startLive(ugm[grpIdx],"group");
  }else{
    if(koMIdx>=koMs.length){advKO();return;}
    const m=koMs[koMIdx];
    if(m.h!==userTeam&&m.a!==userTeam){
      const r=simFull(m.h,m.a,true);m.sH=r.sH;m.sA=r.sA;m.w=r.w;m.played=true;
      if(phase==="Semifinali"&&r.w){const loser=r.w===m.h?m.a:m.h;sfLosers.push(loser);}
      koMIdx++;renderKO();renderPrev();
    }else{startLive(m,"ko");}
  }
}

function goKO(){
  // Applica eventuali risultati avversari rimasti (stesso ordine di afterMatch)
  const rv=window._rivalRes;
  const applied=window._rivalApplied||0;
  if(rv){
    if(applied<=0){applyR(rv.C,rv.D,rv.cdR.sH,rv.cdR.sA);}
    if(applied<=1){applyR(rv.B,rv.D,rv.bdR.sH,rv.bdR.sA);}
    if(applied<=2){applyR(rv.B,rv.C,rv.bcR.sH,rv.bcR.sA);}
    window._rivalRes=null;
  }
  renderGrp();
  const gs=window._gs;
  const sorted=Object.values(gs).sort((a,b)=>b.pts!==a.pts?b.pts-a.pts:(b.gf-b.gs)-(a.gf-a.gs));
  const qual=[sorted[0].n,sorted[1].n];
  if(!qual.includes(userTeam)){
    // Costruisci un pool di 16 squadre (senza la nostra) per simulare il vincitore reale
    const grpAllX=new Set([...grpRivals,userTeam]);
    const noGroupX=shuf(Object.keys(HIST).filter(t=>!qual.includes(t)&&!grpAllX.has(t)));
    window._eliminatedPool=shuf([...qual,...noGroupX.slice(0,14)]);
    showReport("groups",null);return;
  }
  document.getElementById("v-grp").classList.add("hidden");
  document.getElementById("v-ko").classList.remove("hidden");
  document.getElementById("live-box").classList.add("hidden");
  // FIX: esclude TUTTE le squadre del girone (incluse le perdenti) dai Sedicesimi
  const grpAll=new Set([...grpRivals,userTeam]);
  const noGroup=shuf(Object.keys(HIST).filter(t=>!qual.includes(t)&&!grpAll.has(t)));
  // 16 squadre: le 2 qualificate del girone + 14 fuori dal girone
  koPool=shuf([...qual,...noGroup.slice(0,14)]);
  koPhIdx=0;buildKO();
}

function buildKO(){
  phase=KO[koPhIdx];
  document.getElementById("phase-badge").textContent=tPhase(phase);
  document.getElementById("ko-rnd").textContent="▸ "+tPhase(phase);
  koMs=[];
  if(phase==="Finale 3 Posto"){
    const l1=sfLosers[0]||"TBD",l2=sfLosers[1]||"TBD";
    koMs=[{h:l1,a:l2,played:false,sH:0,sA:0,w:null}];
  }else{
    for(let i=0;i<koPool.length-1;i+=2)koMs.push({h:koPool[i],a:koPool[i+1],played:false,sH:0,sA:0,w:null});
  }
  koMIdx=koMs.findIndex(m=>m.h===userTeam||m.a===userTeam);
  if(koMIdx===-1){
    koMs.forEach(m=>{const r=simFull(m.h,m.a,true);m.sH=r.sH;m.sA=r.sA;m.w=r.w;m.played=true;if(phase==="Semifinali"){const l=r.w===m.h?m.a:m.h;sfLosers.push(l);}});
    koMIdx=koMs.length;renderKO();showReport("phase",null,phase);return;
  }
  for(let i=0;i<koMIdx;i++){const r=simFull(koMs[i].h,koMs[i].a,true);koMs[i].sH=r.sH;koMs[i].sA=r.sA;koMs[i].w=r.w;koMs[i].played=true;if(phase==="Semifinali"){const l=r.w===koMs[i].h?koMs[i].a:koMs[i].h;sfLosers.push(l);}}
  renderKO();renderPrev();
}

function advKO(){
  if(phase==="Finale 3 Posto"){
    // Dopo la finale del 3° posto, vai alla Finale tra i vincitori delle semifinali
    koPhIdx=KO.indexOf("Finale");koPool=window._finalists||[];buildKO();return;
  }
  const winners=koMs.map(m=>m.w).filter(Boolean);
  if(phase==="Semifinali"){
    // I vincitori delle semifinali vanno alla Finale, non al 3° posto
    window._finalists=winners;
    koPool=winners;koPhIdx=KO.indexOf("Finale");buildKO();return;
  }
  koPool=winners;koPhIdx++;if(koPhIdx<KO.length)buildKO();
}

function renderKO(){
  const grid=document.getElementById("ko-grid");if(!grid)return;grid.innerHTML="";
  const userIdx=koMs.findIndex(m=>m.h===userTeam||m.a===userTeam);
  // Ordina: partita utente SEMPRE in cima, poi le altre
  const ordered=[];
  if(userIdx>=0)ordered.push({m:koMs[userIdx],origI:userIdx,isU:true});
  koMs.forEach((m,i)=>{if(i!==userIdx)ordered.push({m,origI:i,isU:false});});
  // Dopo la partita utente è giocata, mostra risultati di TUTTE le partite simulate
  const userPlayed=userIdx>=0&&koMs[userIdx]?.played;
  ordered.forEach(({m,origI,isU})=>{
    const d=document.createElement("div");
    const showResult=m.played&&(isU||userPlayed||userIdx===-1);
    d.className="ko-item"+(isU?" umatch":"")+(showResult&&!isU?" played-item":"");
    const hn=isU?'<span style="color:var(--yel)">'+tTeam(m.h)+'</span>':tTeam(m.h);
    const an=isU?'<span style="color:var(--yel)">'+tTeam(m.a)+'</span>':tTeam(m.a);
    if(showResult){
      d.innerHTML='<div class="ko-item-teams">'+hn+' vs '+an+'</div>'
        +'<div class="ko-item-res">'+m.sH+' - '+m.sA+'</div>'
        +'<div class="ko-item-win">▶ '+tTeam(m.w)+'</div>';
    }else{
      d.innerHTML='<div class="ko-item-teams">'+hn+' vs '+an+'</div>'
        +'<div class="ko-item-res" style="color:var(--dim)">—</div>'
        +'<div class="ko-item-win" style="color:var(--dim)">'+(isU?T("lbl_your_match"):'')+'</div>';
    }
    grid.appendChild(d);
  });
}

function tick(){
  if(!matchState||!matchState.active)return;
  const ms=matchState,m=ms.m;
  const pH=teamPow(m.h),pA=teamPow(m.a),wH=Math.pow(pH,4),wA=Math.pow(pA,4);
  document.getElementById("sb-timer").textContent=String(ms.min).padStart(2,"0")+"'";

  if(ms.min===45&&!ms.extra){
    log(T("halftime"),"l-p");ms.min=46;
    matchTmr=setTimeout(tick,getEvMs()*1.5);return;
  }
  if(ms.min===90&&!ms.extra){
    if(ms.ctx==="group"||ms.sH!==ms.sA){
      log(TF("fulltime",{S:ms.sH+"-"+ms.sA}),"l-end");
      ms.active=false;clearTimeout(matchTmr);
      setTimeout(()=>finishMatch(ms),1000);return;
    }
    log(T("extratime_start"),"l-p");ms.extra=true;ms.min=91;
    matchTmr=setTimeout(tick,getEvMs()*1.5);return;
  }
  if(ms.min===105&&ms.extra){
    log(T("extratime_half"),"l-p");ms.min=106;
    matchTmr=setTimeout(tick,getEvMs());return;
  }
  if(ms.min===120&&ms.extra){
    if(ms.sH!==ms.sA){
      log(TF("aet_full",{S:ms.sH+"-"+ms.sA}),"l-end");
      ms.active=false;clearTimeout(matchTmr);
      setTimeout(()=>finishMatch(ms),1000);return;
    }
    log(T("penalties_start"),"l-p");ms.active=false;clearTimeout(matchTmr);
    setTimeout(()=>doPens(ms),getEvMs());return;
  }

  ms.mH=(ms.mH||0)*.95;ms.mA=(ms.mA||0)*.95;
  const ev=Math.random();
  const mods=styleMods(curStl);
  if(ev<0.03){
    const isUH=m.h===userTeam;
    const adjH=wH*(1+(ms.mH||0)*.05),adjA=wA*(1+(ms.mA||0)*.05);
    let isH=Math.random()*(adjH+adjA)<adjH;
    if(isUH&&mods.ab>0&&Math.random()<mods.ab)isH=true;
    if(!isUH&&mods.ab>0&&Math.random()<mods.ab)isH=false;
    if(isUH&&mods.ab<0&&Math.random()<Math.abs(mods.ab))isH=false;
    if(!isUH&&mods.ab<0&&Math.random()<Math.abs(mods.ab))isH=true;
    const team=isH?m.h:m.a,scorer=getScorer(team),isU=team===userTeam;
    const isVar=Math.random()<.08&&curSpd!=="fast";
    if(isH){ms.sH++;ms.mA=(ms.mA||0)+.3;}else{ms.sA++;ms.mH=(ms.mH||0)+.3;}
    const gt=GT();const txt=gt[Math.floor(Math.random()*gt.length)](scorer,ms.min);
    log(txt,logCls(isU,true));doFlash(isU,false);updSB();showGoalAnn(scorer,ms.min,isU,team);
    if(isVar){
      setTimeout(()=>{log(T("var_check"),"l-var");
        setTimeout(()=>{if(isH)ms.sH--;else ms.sA--;log(T("var_disallowed")+scorer,"l-var");doFlash(false,true);updSB();matchTmr=setTimeout(tick,getTickMs());},getEvMs()*.8);},1200);
    }else{
      if(isH)ms.hList.push("⚽"+scorer+" "+ms.min+"'");else ms.aList.push("⚽"+scorer+" "+ms.min+"'");
      if(isU){if(!userStats.scorers[scorer])userStats.scorers[scorer]=0;userStats.scorers[scorer]++;}
      setTimeout(()=>{updSB();ms.min++;matchTmr=setTimeout(tick,getTickMs());},2000);
    }
    return;
  }else if(ev<0.12&&curSpd!=="fast"){
    const isH=Math.random()*(wH+wA)<wH,isU=(isH?m.h:m.a)===userTeam;
    // Prob rigore assegnato: ~0.2 per partita / 90 tick ≈ 0.0022/tick
    // Usiamo un sottorange del 0.03..0.12: 0.03..0.0322
    if(ev>=0.03&&ev<0.0322&&ms.min>10&&ms.min<88){
      const penScorer=getScorer(isH?m.h:m.a);
      const penIsU=(isH?m.h:m.a)===userTeam;
      log(String(ms.min).padStart(2,"0")+"' "+(isH?m.h:m.a)+": "+TF("pen_in_match",{S:penScorer}),logCls(penIsU,true));
      if(isH)ms.sH++;else ms.sA++;
      if(isH)ms.hList.push("⚽"+penScorer+" "+ms.min+"' (R)");else ms.aList.push("⚽"+penScorer+" "+ms.min+"' (R)");
      if(penIsU){if(!userStats.scorers[penScorer])userStats.scorers[penScorer]=0;userStats.scorers[penScorer]++;}
      doFlash(penIsU,false);updSB();
      ms.min++;matchTmr=setTimeout(tick,getTickMs()+1500);return;
    }
    log(String(ms.min).padStart(2,"0")+"' "+(isH?m.h:m.a)+": "+rnd(isH?ATKT():DEFT()),logCls(isU,false));
    ms.min++;matchTmr=setTimeout(tick,getTickMs()+getActMs());return;
  }
  ms.min++;matchTmr=setTimeout(tick,getTickMs());
}

function doPens(ms){
  const m=ms.m,pH=teamPow(m.h),pA=teamPow(m.a);
  const probH=Math.min(.82,.60+(pH-7.5)*.028),probA=Math.min(.82,.60+(pA-7.5)*.028);
  let rH=0,rA=0;
  const goalsBeforePens={sH:ms.sH,sA:ms.sA};
  // Mostra il pannello rigori nel tabellone
  const penBox=document.getElementById("sb-pen-box");
  const penH=document.getElementById("sb-pen-h");
  const penA=document.getElementById("sb-pen-a");
  const isUserHome=m.h===userTeam;
  if(penBox){penBox.style.display="block";}
  if(penH)penH.innerHTML="";
  if(penA)penA.innerHTML="";
  function delay(t){return new Promise(r=>setTimeout(r,t));}
  // Pool calciatori per rotazione
  const hSquad=HIST[m.h]?HIST[m.h].sq.slice(1):[...Array(11)].map((_,i)=>"P"+(i+1));
  const aSquad=HIST[m.a]?HIST[m.a].sq.slice(1):m.a===userTeam?squad.filter(p=>p&&p.r[0]!=="P").map(p=>p.n):[...Array(11)].map((_,i)=>"P"+(i+1));
  const userNonGk=squad.filter(p=>p&&p.r[0]!=="P").map(p=>p.n);
  let hPool=[...shuf(m.h===userTeam?[...userNonGk]:hSquad)];
  let aPool=[...shuf(m.a===userTeam?[...userNonGk]:aSquad)];
  let hIdx=0,aIdx=0;
  function nextH(){if(hIdx>=hPool.length){hPool=shuf([...hPool]);hIdx=0;}return hPool[hIdx++];}
  function nextA(){if(aIdx>=aPool.length){aPool=shuf([...aPool]);aIdx=0;}return aPool[aIdx++];}
  function addPenRow(isH,scorer,scored){
    // Aggiungi riga nella colonna giusta (sempre: user=verde, opp=rosso)
    const userIsH=m.h===userTeam;
    const isUser=(isH&&userIsH)||(!isH&&!userIsH);
    const el=isH?penH:penA;
    if(el){
      const icon=scored?"⚽":"✗";
      const col=scored?(isUser?"var(--px)":"var(--red)"):"var(--dim)";
      el.innerHTML+='<div style="color:'+col+'">'+icon+' '+scorer+'</div>';
    }
  }
  async function kick(team,scorer,prob,isH){
    await delay(2000);
    const cls=team===userTeam?"l-pu":"l-po";
    log(TF("pen_taker",{T:team,S:scorer}),cls);
    await delay(2000);
    let scored=Math.random()<prob;
    if(scored){if(isH)rH++;else rA++;log(TF("pen_scored",{S:scorer}),cls);doFlash(team===userTeam,false);}
    else log(TF("pen_missed",{S:scorer}),"l-miss");
    addPenRow(isH,scorer,scored);
    document.getElementById("sb-score").innerHTML=rH+' - '+rA+'<span style="font-size:7px;color:var(--yel)">'+T("pen_suffix")+'</span>';
    await delay(800);
  }
  async function p1(k){
    if(k>5){await p1end();return;}
    await kick(m.h,nextH(),probH,true);
    if(rH-rA>(6-k)){await fin();return;}  // A ha ancora (6-k) tiri: round k + rounds rimanenti
    await kick(m.a,nextA(),probA,false);
    if(rA-rH>(5-k)){await fin();return;}  // H ha ancora (5-k) tiri: solo rounds rimanenti
    await p1(k+1);
  }
  async function p1end(){if(rH!==rA){await fin();return;}await delay(2000);log(T("sudden_death"),"l-p");await sd(0);}
  async function sd(c){
    if(c>=20){await fin();return;}
    await kick(m.h,nextH(),probH,true);await kick(m.a,nextA(),probA,false);
    if(rH>rA||rA>rH){await fin();return;}await sd(c+1);
  }
  async function fin(){
    const w=rH>rA?m.h:m.a;await delay(2000);
    log(TF("pen_result",{H:m.h,RH:rH,RA:rA,A:m.a,W:w}),"l-p");
    await delay(2000);if(rH>rA)ms.sH++;else ms.sA++;
    ms.fromPens=true;ms.pensGoals={sH:ms.sH-goalsBeforePens.sH,sA:ms.sA-goalsBeforePens.sA};
    log(T("final_whistle"),"l-end");
    setTimeout(()=>finishMatch(ms),1200);
  }
  p1(1);
}

function finishMatch(ms){
  clearTimeout(matchTmr);
  const m=ms.m,fH=ms.sH,fA=ms.sA;
  const uIsH=m.h===userTeam;
  // Escludi gol ai rigori dalle statistiche
  const penG=ms.fromPens?(ms.pensGoals||{sH:0,sA:0}):{sH:0,sA:0};
  const regH=fH-(penG.sH||0),regA=fA-(penG.sA||0);
  const uG=uIsH?regH:regA,uC=uIsH?regA:regH;
  const userWon=(uIsH&&fH>fA)||(!uIsH&&fA>fH),isDraw=fH===fA;
  userStats.m++;userStats.gf+=uG;userStats.gs+=uC;
  if(isDraw)userStats.d++;else if(userWon)userStats.w++;else userStats.l++;
  m.sH=fH;m.sA=fA;m.w=fH>fA?m.h:fA>fH?m.a:null;m.played=true;
  // Calcola il Player of the Match (può essere anche un giocatore avversario)
  let motm=null;
  const counts={};
  (ms.hList||[]).forEach(s=>{
    const nameMatch=s.match(/⚽([^0-9]+?)\s*\d+/);
    const name=nameMatch?nameMatch[1].trim():null;
    if(name){if(!counts[name])counts[name]={c:0,isOur:uIsH};counts[name].c++;}
  });
  (ms.aList||[]).forEach(s=>{
    const nameMatch=s.match(/⚽([^0-9]+?)\s*\d+/);
    const name=nameMatch?nameMatch[1].trim():null;
    if(name){if(!counts[name])counts[name]={c:0,isOur:!uIsH};counts[name].c++;}
  });
  let best=null,bestN=0,bestIsOur=true;
  for(const[k,v]of Object.entries(counts)){if(v.c>bestN){bestN=v.c;best=k;bestIsOur=v.isOur;}}
  if(best)motm={name:best,goals:bestN,gk:false,isOpponent:!bestIsOur};
  if(!motm&&uC===0&&squad[0]){
    motm={name:squad[0].n,goals:0,gk:true,isOpponent:false};
  }
  let svg,title,sub;
  if(userWon){svg=SVG_WIN;title=T("res_win");}
  else if(isDraw){svg="";title=T("res_draw");}
  else{svg="";title=T("res_loss");}
  sub=m.h+" VS "+m.a;
  showOverlay(svg,title,fH+" - "+fA,sub,motm,()=>afterMatch(ms,m,fH,fA,userWon,isDraw));
}

function afterMatch(ms,m,fH,fA,userWon,isDraw){
  if(ms.ctx!=="group"){
    // Registra la partita nel percorso del torneo (per il report finale)
    const uIsH=m.h===userTeam;
    window._matchHistory.push({phase:phase,opp:uIsH?m.a:m.h,uG:uIsH?fH:fA,oG:uIsH?fA:fH});
  }
  if(ms.ctx==="group"){
    applyR(m.h,m.a,fH,fA);
    // Applica i risultati avversari uno alla volta nell'ordine corretto:
    // dopo P1 (user vs B): applica C vs D -> tutti a 1 partita
    // dopo P2 (user vs C): applica B vs D -> tutti a 2 partite
    // dopo P3 (D vs user): applica B vs C -> tutti a 3 partite
    const rv=window._rivalRes;
    const applied=window._rivalApplied||0;
    if(rv){
      if(applied===0){applyR(rv.C,rv.D,rv.cdR.sH,rv.cdR.sA);}
      else if(applied===1){applyR(rv.B,rv.D,rv.bdR.sH,rv.bdR.sA);}
      else if(applied>=2){applyR(rv.B,rv.C,rv.bcR.sH,rv.bcR.sA);window._rivalRes=null;}
      window._rivalApplied=(applied+1);
    }
    renderGrp();grpIdx++;setTimeout(renderPrev,400);
  }else{
    if(phase==="Semifinali"){const loser=m.w===m.h?m.a:m.h;sfLosers.push(loser);}
    const isLast=phase==="Finale",is3rd=phase==="Finale 3 Posto";
    if(isLast&&userWon){renderKO();koMIdx=koMs.length;showReport("champion","champion");}
    else if(is3rd&&userWon){renderKO();koMIdx=koMs.length;showReport("third","third");}
    else if(is3rd&&!userWon){renderKO();koMIdx=koMs.length;showReport("fourth","fourth");}
    else if(isLast&&!userWon){window._lastFinalWinner=m.w;renderKO();koMIdx=koMs.length;showReport("second","second");}
    else if(!userWon&&!isDraw){
      if(phase==="Semifinali"){
        for(let i=koMIdx+1;i<koMs.length;i++){const r=simFull(koMs[i].h,koMs[i].a,true);koMs[i].sH=r.sH;koMs[i].sA=r.sA;koMs[i].w=r.w;koMs[i].played=true;const l=r.w===koMs[i].h?koMs[i].a:koMs[i].h;if(!sfLosers.includes(l))sfLosers.push(l);}
        window._finalists=koMs.map(mm=>mm.w).filter(Boolean);
        renderKO();koMIdx=koMs.length;koPhIdx=KO.indexOf("Finale 3 Posto");
        setTimeout(buildKO,600);
      }else{
        // Simula le partite rimanenti del turno
        for(let i=koMIdx+1;i<koMs.length;i++){
          const r=simFull(koMs[i].h,koMs[i].a,true);
          koMs[i].sH=r.sH;koMs[i].sA=r.sA;koMs[i].w=r.w;koMs[i].played=true;
        }
        koMIdx=koMs.length;
        renderKO();
        // Mostra tabellone aggiornato prima del report; aggiungi bottone per proseguire
        const btn=document.getElementById("btn-play");
        const elimPhase=phase; // cattura il valore corrente, non per riferimento
        if(btn){btn.textContent=T("btn_view_report");btn.disabled=false;btn.className="btn btn-g";
          btn.onclick=()=>showReport("phase",null,elimPhase);}
      }
    }else{
      // User ha vinto questo round
      for(let i=koMIdx+1;i<koMs.length;i++){
        const r=simFull(koMs[i].h,koMs[i].a,true);
        koMs[i].sH=r.sH;koMs[i].sA=r.sA;koMs[i].w=r.w;koMs[i].played=true;
        if(phase==="Semifinali"){const l=r.w===koMs[i].h?koMs[i].a:koMs[i].h;if(!sfLosers.includes(l))sfLosers.push(l);}
      }
      renderKO();koMIdx=koMs.length;
      if(phase==="Semifinali"){
        // User vince la semifinale: loser è l'avversario che ha perso la nostra partita
        const myLoser=m.w===m.h?m.a:m.h;
        if(!sfLosers.includes(myLoser))sfLosers.unshift(myLoser);// metti il loser dell'utente prima
        window._finalists=koMs.map(mm=>mm.w).filter(Boolean);
        koPool=window._finalists;koPhIdx=KO.indexOf("Finale");
        setTimeout(buildKO,600);
      }else{
        setTimeout(renderPrev,600);
      }
    }
  }
}

function predChampion(){
  // Caso "VICE CAMPIONE": il vincitore reale è già noto (l'avversario che ci ha battuto in finale)
  if(window._lastFinalWinner)return window._lastFinalWinner;

  // Caso finalisti determinati (nessuno dei due è la nostra squadra, dato che siamo stati eliminati prima)
  if(window._finalists&&window._finalists.length>=2){
    const cand=window._finalists.filter(t=>t!==userTeam);
    if(cand.length>=2)return simFull(cand[0],cand[1],true).w||cand[0];
    if(cand.length===1)return cand[0];
  }

  // Caso eliminazione in un turno KO (Ottavi/Quarti/Semifinali):
  // usa i vincitori REALI del round corrente, escludendo sempre la nostra squadra
  if(koMs&&koMs.length>0){
    let pool=koMs.map(m=>m.w).filter(Boolean).filter(t=>t!==userTeam);
    if(pool.length>=1){
      for(let r=0;r<6;r++){
        if(pool.length<=1)break;
        const w=[];
        for(let i=0;i<pool.length-1;i+=2)w.push(simFull(pool[i],pool[i+1],true).w||pool[i]);
        if(pool.length%2===1)w.push(pool[pool.length-1]);
        pool=w;
      }
      return pool[0]||"—";
    }
  }

  // Caso eliminazione ai gironi: pool di 16 squadre senza la nostra, costruito in goKO
  if(window._eliminatedPool&&window._eliminatedPool.length>=2){
    let pool=window._eliminatedPool.filter(t=>t!==userTeam);
    for(let r=0;r<6;r++){
      if(pool.length<=1)break;
      const w=[];
      for(let i=0;i<pool.length-1;i+=2)w.push(simFull(pool[i],pool[i+1],true).w||pool[i]);
      if(pool.length%2===1)w.push(pool[pool.length-1]);
      pool=w;
    }
    return pool[0]||"—";
  }

  // Fallback estremo: simula da squadre storiche forti (esclude sempre userTeam)
  const top=shuf(Object.keys(HIST).filter(t=>HIST[t].tier==="strong")).slice(0,8);
  let pool=top;
  for(let r=0;r<4;r++){const w=[];for(let i=0;i<pool.length-1;i+=2){w.push(simFull(pool[i],pool[i+1],true).w||pool[i]);}pool=w;if(pool.length<=1)break;}
  return pool[0]||"—";
}

    const p=squad[i];

    pitchDots+='<div style="position:absolute;transform:translate(-50%,-50%);left:'+sl[0]+'%;top:'+sl[1]+'%;display:flex;flex-direction:column;align-items:center;gap:2px;z-index:5">'

      +(from?'<div style="font-size:6px;color:var(--cya);text-shadow:1px 1px 0 #000;text-align:center;line-height:1">'+tTeam(from)+'</div>':'')
      +'<div style="font-size:7px;text-align:center;line-height:1">'+st+'</div>'
      +'</div>';
  });
  // Percorso del torneo (solo turni eliminatori)
  let pathHtml="";
  if(window._matchHistory&&window._matchHistory.length>0){
    const rows=window._matchHistory.map(h=>{
      const res=h.uG+"-"+h.oG;
      const col=h.uG>h.oG?"var(--px)":h.uG<h.oG?"var(--red)":"var(--yel)";
      return '<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--border);font-size:7px">'
        +'<span style="color:var(--cya)">'+tPhase(h.phase)+'</span>'
        +'<span style="color:'+col+'">'+res+'</span>'
        +'<span style="color:var(--dim)">vs '+tTeam(h.opp)+'</span>'
        +'</div>';
    }).join("");
    pathHtml='<div style="background:var(--surface);border:2px solid var(--border);padding:10px;margin:10px 0;text-align:left">'
      +'<div style="font-size:8px;color:var(--cya);margin-bottom:6px">'+T("your_path")+'</div>'
      +rows+'</div>';
  }
  // Calcola l'etichetta della fase/risultato in base allo stageKey
  let stageLabel;
  if(resultType==="champion")stageLabel=T("world_champions");
  else if(resultType==="second")stageLabel=T("runner_up");
  else if(resultType==="third")stageLabel=T("third_place");
  else if(resultType==="fourth")stageLabel=T("fourth_place");
  else if(stageKey==="groups")stageLabel=T("eliminated_groups");
  else if(stageKey==="phase")stageLabel=T("eliminated_in")+" "+tPhase(extraPhase);
  else stageLabel=stageKey;
  rpt.innerHTML=
    '<div style="text-align:center;padding:14px 0">'+
    (mSvg?'<div style="margin:0 auto 12px;text-align:center">'+mSvg+'</div>':'')+
    (mTitle?'<div style="font-size:9px;color:var(--yel);margin-bottom:8px;line-height:2">'+mTitle+'</div>':'')+
    '<div class="rep-stage">'+stageLabel+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:12px 0">'+
    '<div class="stat-box"><div class="stat-num">'+userStats.m+'</div><div class="stat-lbl">'+T("rep_matches")+'</div></div>'+
    '<div class="stat-box"><div class="stat-num" style="color:var(--px)">'+userStats.w+'</div><div class="stat-lbl">'+T("rep_wins")+'</div></div>'+
    '<div class="stat-box"><div class="stat-num" style="color:var(--yel)">'+userStats.d+'</div><div class="stat-lbl">'+T("rep_draws")+'</div></div>'+
    '<div class="stat-box"><div class="stat-num" style="color:var(--red)">'+userStats.l+'</div><div class="stat-lbl">'+T("rep_losses")+'</div></div>'+
    '</div>'+
    pathHtml+
    // Capocannoniere con pallone pixel
    '<div style="background:var(--surface);border:2px solid var(--border);padding:10px;margin:10px 0;display:flex;align-items:center;gap:10px">'+
    '<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><circle cx="16" cy="16" r="14" fill="#fff" stroke="#222" stroke-width="1.5"/><polygon points="16,4 20,10 14,14 10,10" fill="#222"/><polygon points="26,12 28,18 22,20 18,14" fill="#222"/><polygon points="22,26 16,28 14,22 20,18" fill="#222"/><polygon points="10,26 6,20 10,16 16,20" fill="#222"/><polygon points="6,12 12,10 14,16 8,18" fill="#222"/></svg>'+
    '<div style="text-align:left"><div style="font-size:7px;color:var(--dim);margin-bottom:3px">'+T("top_scorer")+'</div><div style="font-size:8px;color:var(--yel)">'+topScorerStr+'</div></div>'+
    '</div>'+
    // Campo con formazione
    '<div style="font-size:8px;color:var(--cya);margin:12px 0 6px">'+T("your_nation")+'</div>'+
    '<div style="position:relative;width:100%;padding-top:124%;background:#0a3d0a;border:2px solid #00aa00;overflow:hidden;max-width:480px;margin:0 auto">'+
    '<div style="position:absolute;inset:0">'+
    '<div style="position:absolute;top:0;left:30%;width:40%;height:12%;border:1px solid rgba(0,170,0,.4);border-top:none"></div>'+
    '<div style="position:absolute;bottom:0;left:30%;width:40%;height:12%;border:1px solid rgba(0,170,0,.4);border-bottom:none"></div>'+
    '<div style="position:absolute;top:50%;left:0;right:0;height:1px;background:rgba(0,170,0,.5)"></div>'+
    '<div style="position:absolute;top:50%;left:50%;width:20%;padding-top:20%;border:1px solid rgba(0,170,0,.4);border-radius:50%;transform:translate(-50%,-50%)"></div>'+
    pitchDots+
    '</div></div>'+
    (resultType!=="champion"?'<div class="champ-note" style="margin-top:12px"><span class="cn-l">'+T("world_champion_sim")+'</span><span class="cn-n">'+tTeam(champion)+'</span></div>':'')+
    '<button class="btn btn-g" style="margin-top:14px" onclick="location.reload()">'+T("btn_restart")+'</button>'+
    '</div>';
}

init();
</script>
</body>
</html>
